    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-primary:   #8B7355;
      --color-accent:    #C4956A;
      --color-bg:        #FDFCFA;
      --color-bg-alt:    #F5F1EB;
      --color-muted:     #E8E0D8;
      --color-text:      #2C2C2C;
      --color-text-light:#56504A;
      --color-wa:        #25D366;
      --font-heading: 'Cormorant Garamond', Georgia, serif;
      --font-body:    'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      font-family: var(--font-body);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;

    .ornament {

      font-size: 7rem;

      color: var(--color-muted);
      line-height: 1;
      margin-bottom: 1rem;
      letter-spacing: -2px;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: var(--color-accent);
      margin: 1.5rem auto;
    }

    h1 {
      font-family: var(--font-heading);
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 400;
      color: var(--color-primary);
      margin-bottom: .75rem;

      font-size: .95rem;
      color: var(--color-text-light);
      line-height: 1.7;
      max-width: 360px;
      margin: 0 auto 2rem;
    }

    .btn {
      display: inline-block;
      background: var(--color-primary);
      color: #fff;
      font-family: var(--font-body);
      font-size: .85rem;
      font-weight: 500;
      letter-spacing: .06em;
      text-transform: uppercase;
      text-decoration: none;
      padding: .9rem 2rem;
      border-radius: 999px;
      transition: background .25s;
    }
    .btn:hover { background: #6e5b42; }

    .wa-link {
      display: block;
      margin-top: 1.25rem;
      font-size: .85rem;
      color: var(--color-text-light);
      text-decoration: none;
    }
